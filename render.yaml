services:
  - type: web
    name: ticket-event
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
